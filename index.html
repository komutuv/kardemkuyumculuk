<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Kardem Kuyumcu</title>

<style>
body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
background:#0b1220;
color:#fff;
margin:0;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
}

.wrap{
width:100%;
max-width:420px;
padding:20px;
}

.card{
background:#111b31;
border-radius:20px;
padding:22px;
box-shadow:0 10px 40px rgba(0,0,0,.4);
text-align:center;
}

/* LOGO / UNVAN */
.logo{
font-size:18px;
font-weight:800;
letter-spacing:.5px;
margin-bottom:20px;
}

/* BANKA KART */
.bank{
border-radius:16px;
padding:16px;
margin-top:12px;
text-align:left;
}

.bank-title{
font-weight:700;
margin-bottom:6px;
}

/* RENKLER */
.yapikredi{ background:#1e3a8a; }
.qnb{ background:#5b2c83; }

.iban{
font-weight:800;
letter-spacing:.5px;
margin:8px 0;
}

/* BUTONLAR */
.actions{
display:flex;
gap:8px;
margin-top:10px;
}

button{
flex:1;
border:none;
border-radius:10px;
padding:10px;
font-weight:700;
cursor:pointer;
}

.copy{
background:#fff;
color:#000;
}

.wp{
background:#25D366;
color:#fff;
}
</style>
</head>

<body>

<div class="wrap">
<div class="card">

<div class="logo">
KARDEM KUYUMCU PIRLANTA TİCARET LİMİTED ŞİRKETİ
</div>

<!-- YAPI KREDİ -->
<div class="bank yapikredi">
<div class="bank-title">Yapı Kredi</div>
<div class="iban" id="iban1">TR43 0006 7010 0000 0039 7554 53</div>

<div class="actions">
<button class="copy" onclick="copyIban('iban1')">Kopyala</button>
<button class="wp" onclick="shareWhatsApp('iban1')">WhatsApp</button>
</div>
</div>

<!-- QNB -->
<div class="bank qnb">
<div class="bank-title">QNB</div>
<div class="iban" id="iban2">TR49 0011 1000 0000 0161 9091 16</div>

<div class="actions">
<button class="copy" onclick="copyIban('iban2')">Kopyala</button>
<button class="wp" onclick="shareWhatsApp('iban2')">WhatsApp</button>
</div>
</div>

</div>
</div>

<script>
function copyIban(id){
const text = document.getElementById(id).innerText;
navigator.clipboard.writeText(text);
alert("IBAN kopyalandı");
}

function shareWhatsApp(id){
const text = document.getElementById(id).innerText;
const message = "IBAN: " + text;
window.open("https://wa.me/?text=" + encodeURIComponent(message), "_blank");
}
</script>

</body>
</html>
